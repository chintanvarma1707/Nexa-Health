<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Nexa Health – Your Premium Healthcare Assistant offering AI triage, personalized medical insights, and more." />
  <title>Nexa Health | Premium Healthcare Assistant</title>
  <style>
    /* Preloader CSS directly in initial HTML to ensure it shows immediately */
    /* Preloader CSS directly in initial HTML for instant dark-mode experience */
    #nexa-preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      font-family: 'Inter', system-ui, sans-serif;
    }

    .preloader-logo {
      position: relative;
      width: 140px;
      height: 140px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 2.5rem;
    }

    .pulse-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid transparent;
      animation: spin-pulse 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    .pulse-ring-1 {
      border-top-color: #10b981;
      border-right-color: rgba(16, 185, 129, 0.2);
    }

    .pulse-ring-2 {
      width: 80%;
      height: 80%;
      border-bottom-color: #34d399;
      border-left-color: rgba(52, 211, 153, 0.2);
      animation-direction: reverse;
      animation-duration: 4s;
    }

    .pulse-ring-3 {
      width: 60%;
      height: 60%;
      border-top-color: #059669;
      border-left-color: rgba(5, 150, 105, 0.2);
      animation-duration: 2s;
    }

    .preloader-heart {
      color: #10b981;
      animation: heartbeat 1.5s infinite;
      filter: drop-shadow(0px 0px 20px rgba(16, 185, 129, 0.4));
    }

    .preloader-text-container {
      text-align: center;
    }

    .preloader-title {
      font-size: 2.5rem;
      font-weight: 900;
      margin-bottom: 0.75rem;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #ffffff 0%, #34d399 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .preloader-subtitle {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    .loading-dots:after {
      content: '.';
      animation: dots 1.5s steps(5, end) infinite;
    }

    @keyframes spin-pulse {
      0% { transform: rotate(0deg) scale(0.9); opacity: 0.8; }
      50% { transform: rotate(180deg) scale(1.05); opacity: 0.4; }
      100% { transform: rotate(360deg) scale(0.9); opacity: 0.8; }
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      15% { transform: scale(1.2); }
      30% { transform: scale(1); }
      45% { transform: scale(1.15); }
      60% { transform: scale(1); }
    }

    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }
  </style>
</head>

<body>
  <div id="nexa-preloader">
    <div class="preloader-logo">
      <div class="pulse-ring pulse-ring-1"></div>
      <div class="pulse-ring pulse-ring-2"></div>
      <div class="pulse-ring pulse-ring-3"></div>
      <div class="preloader-heart">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
          <path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/>
        </svg>
      </div>
    </div>
    <div class="preloader-text-container">
      <h1 class="preloader-title">Nexa Health</h1>
      <p class="preloader-subtitle">Loading Critical Health Systems<span class="loading-dots"></span></p>
    </div>
  </div>
  <div id="root" style="display: none;"></div>

  <script>
    // Artificial delay to show the heartbeat preloader
    window.addEventListener('load', () => {
      setTimeout(() => {
        const preloader = document.getElementById('nexa-preloader');
        const root = document.getElementById('root');
        if (preloader) {
          preloader.style.transition = 'opacity 0.5s ease';
          preloader.style.opacity = '0';
          setTimeout(() => {
            preloader.remove();
            if (root) {
              root.style.display = 'block';
            }
          }, 500); // Wait for fade out
        }
      }, 3000); // Adjust this to keep the preloader on screen longer (3000ms = 3 seconds)
    });
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
